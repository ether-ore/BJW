    x="78" y="47"
    font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="30"
    letter-spacing="-0.3">
    <tspan font-weight="400" fill="white">BlackJack </tspan><tspan font-weight="700" fill="#4db6ac">Wonk</tspan>
  </text>

