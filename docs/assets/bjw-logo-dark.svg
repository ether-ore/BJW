<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" width="380" height="72">

  <!-- Spade icon — white for dark background -->
  <circle cx="19" cy="37" r="11" fill="white"/>
  <circle cx="41" cy="37" r="11" fill="white"/>
  <polygon points="30,12  16,37  44,37" fill="white"/>
  <rect x="26.5" y="46" width="7" height="9" rx="1.5" fill="white"/>
  <rect x="19" y="53" width="22" height="5" rx="2.5" fill="white"/>

  <!-- Divider -->
  <line x1="64" y1="14" x2="64" y2="58" stroke="#6b7280" stroke-width="1"/>

  <!-- Wordmark — white + accent blue for dark background -->
