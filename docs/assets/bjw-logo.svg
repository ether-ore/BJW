<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" width="380" height="72">

  <!-- Spade icon -->
  <circle cx="19" cy="37" r="11" fill="#111"/>
  <circle cx="41" cy="37" r="11" fill="#111"/>
  <polygon points="30,12  16,37  44,37" fill="#111"/>
  <rect x="26.5" y="46" width="7" height="9" rx="1.5" fill="#111"/>
  <rect x="19" y="53" width="22" height="5" rx="2.5" fill="#111"/>

  <!-- Divider -->
  <line x1="64" y1="14" x2="64" y2="58" stroke="#d1d5db" stroke-width="1"/>

  <!-- Combined wordmark using tspan so spacing is exact -->
  <text
    x="78" y="47"
    font-family="-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="30"
    letter-spacing="-0.3">
    <tspan font-weight="400" fill="#111111">BlackJack </tspan><tspan font-weight="700" fill="#2563eb">Wonk</tspan>
  </text>

</svg>
